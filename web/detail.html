<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>工单详情 - 市场监管工单智能处理演示</title>
  <link rel="stylesheet" href="/demo/styles.css?v=20260603-6" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>工单详情</h1>
      <p>查看工单详情并执行智能流转</p>
    </div>
    <div class="top-actions">
      <button id="backBtn" class="btn secondary">返回列表</button>
      <button id="detailDetectBtn" class="btn primary">智能流转</button>
    </div>
  </header>

  <main class="layout">
    <section class="detail-grid">
      <section class="panel detail-panel">
        <div class="panel-title">
          <h2>工单详情</h2>
          <span id="selectedTicketNo" class="muted">加载中</span>
        </div>
        <div id="detailEmpty" class="empty">正在加载工单详情...</div>
        <div id="ticketDetail" class="detail-content hidden"></div>
      </section>

      <section class="panel ai-panel">
        <div class="panel-title">
          <h2>智能流转结果</h2>
          <span id="aiStatus" class="muted">未检测</span>
        </div>
        <div id="aiEmpty" class="empty">点击“智能流转”后展示分析结果和下一步操作。</div>
        <div id="aiResult" class="ai-result hidden"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="/demo/common.js?v=20260603-6"></script>
  <script src="/demo/detail.js?v=20260603-6"></script>
</body>
</html>
