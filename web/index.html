<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>市场监管工单智能处理演示</title>
  <link rel="stylesheet" href="/demo/styles.css?v=20260603-6" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>市场监管工单管理系统</h1>
      <p>智能辅助流转、退单、补充信息和职业索赔风险预警演示</p>
    </div>
    <div class="top-actions">
      <button id="supplementTasksBtn" class="btn secondary">补充任务</button>
      <button id="refreshBtn" class="btn secondary">刷新工单</button>
      <button id="processAllBtn" class="btn primary">批量智能流转</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel list-panel">
      <div class="panel-title">
        <h2>待处理工单列表</h2>
        <span id="ticketCount" class="muted">0 条</span>
      </div>
      <div class="table-wrap ticket-list-wrap">
        <table class="ticket-table">
          <thead>
            <tr>
              <th>序号</th>
              <th>系统流水号</th>
              <th>任务单编号</th>
              <th>标题</th>
              <th>工单内容</th>
              <th>事件上报人姓名</th>
              <th>事件上报人手机号</th>
              <th>发生时间</th>
              <th>计划完成时间</th>
              <th>事件类型</th>
              <th>智能状态</th>
              <th>智能识别性质</th>
              <th>疑似职业索赔</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="ticketRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="/demo/common.js?v=20260603-6"></script>
  <script src="/demo/app.js?v=20260603-6"></script>
</body>
</html>
